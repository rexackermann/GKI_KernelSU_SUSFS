name: 'Configure Kernel Options'
description: 'Set up kernel configuration fragment with required options'
inputs:
  kernel_version:
    description: 'Kernel version (e.g., 6.6)'
    required: true

runs:
  using: "composite"
  steps:
    - name: Apply Kernel Configuration
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        cat >> "${{ github.workspace }}/wild_gki.fragment" << 'EOF'
        # Required Kernel Configuration for Droidspaces
        # IPC mechanisms
        CONFIG_SYSCTL=y
        CONFIG_SYSVIPC=y
        CONFIG_POSIX_MQUEUE=y

        # Core namespace support
        CONFIG_NAMESPACES=y
        CONFIG_PID_NS=y
        CONFIG_UTS_NS=y
        CONFIG_IPC_NS=y

        # Seccomp support
        CONFIG_SECCOMP=y
        CONFIG_SECCOMP_FILTER=y

        # Control groups support
        CONFIG_CGROUPS=y
        CONFIG_CGROUP_DEVICE=y
        CONFIG_CGROUP_PIDS=y
        CONFIG_MEMCG=y
        CONFIG_CGROUP_SCHED=y
        CONFIG_FAIR_GROUP_SCHED=y
        CONFIG_CGROUP_FREEZER=y
        CONFIG_CGROUP_NET_PRIO=y

        # Device filesystem support
        CONFIG_DEVTMPFS=y

        # Overlay filesystem support
        CONFIG_OVERLAY_FS=y

        # Firmware loading support
        CONFIG_FW_LOADER=y
        CONFIG_FW_LOADER_USER_HELPER=y
        CONFIG_FW_LOADER_COMPRESS=y

        # Networking Configuration
        CONFIG_NET_NS=y
        CONFIG_VETH=y
        CONFIG_BRIDGE=y
        CONFIG_NETFILTER=y
        CONFIG_BRIDGE_NETFILTER=y
        CONFIG_NETFILTER_ADVANCED=y
        CONFIG_NF_CONNTRACK=y
        CONFIG_IP_NF_IPTABLES=y
        CONFIG_IP_NF_FILTER=y
        CONFIG_NF_NAT=y
        CONFIG_NF_TABLES=y
        CONFIG_IP_NF_TARGET_MASQUERADE=y
        CONFIG_NETFILTER_XT_TARGET_MASQUERADE=y
        CONFIG_NETFILTER_XT_TARGET_TCPMSS=y
        CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
        CONFIG_NF_CONNTRACK_NETLINK=y
        CONFIG_NF_NAT_REDIRECT=y
        CONFIG_IP_ADVANCED_ROUTER=y
        CONFIG_IP_MULTIPLE_TABLES=y
        CONFIG_IP_NF_TARGET_TTL=y
        CONFIG_IP6_NF_TARGET_HL=y
        CONFIG_IP6_NF_MATCH_HL=y

        # BBR TCP Congestion Control
        CONFIG_TCP_CONG_ADVANCED=y
        CONFIG_TCP_CONG_BBR=y
        CONFIG_NET_SCH_FQ=y

        # IPSet Support
        CONFIG_IP_SET=y
        CONFIG_IP_SET_MAX=65534
        CONFIG_IP_SET_BITMAP_IP=y
        CONFIG_IP_SET_BITMAP_IPMAC=y
        CONFIG_IP_SET_BITMAP_PORT=y
        CONFIG_IP_SET_HASH_IP=y
        CONFIG_IP_SET_HASH_IPMARK=y
        CONFIG_IP_SET_HASH_IPPORT=y
        CONFIG_IP_SET_HASH_IPPORTIP=y
        CONFIG_IP_SET_HASH_IPPORTNET=y
        CONFIG_IP_SET_HASH_IPMAC=y
        CONFIG_IP_SET_HASH_MAC=y
        CONFIG_IP_SET_HASH_NETPORTNET=y
        CONFIG_IP_SET_HASH_NET=y
        CONFIG_IP_SET_HASH_NETNET=y
        CONFIG_IP_SET_HASH_NETPORT=y
        CONFIG_IP_SET_HASH_NETIFACE=y
        CONFIG_IP_SET_LIST_SET=y

        # Additional Configuration for UFW/Fail2ban
        CONFIG_NETFILTER_XT_MATCH_COMMENT=y
        CONFIG_NETFILTER_XT_MATCH_STATE=y
        CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
        CONFIG_NETFILTER_XT_MATCH_MULTIPORT=y
        CONFIG_NETFILTER_XT_MATCH_HL=y
        CONFIG_NETFILTER_XT_TARGET_REJECT=y
        CONFIG_IP_NF_TARGET_REJECT=y
        CONFIG_NETFILTER_XT_TARGET_LOG=y
        CONFIG_IP_NF_TARGET_ULOG=y
        CONFIG_NETFILTER_XT_MATCH_RECENT=y
        CONFIG_NETFILTER_XT_MATCH_LIMIT=y
        CONFIG_NETFILTER_XT_MATCH_HASHLIMIT=y
        CONFIG_NETFILTER_XT_MATCH_OWNER=y
        CONFIG_NETFILTER_XT_MATCH_PKTTYPE=y
        CONFIG_NETFILTER_XT_MATCH_MARK=y
        CONFIG_NETFILTER_XT_TARGET_MARK=y
        CONFIG_NETFILTER_XT_SET=y
        CONFIG_NETFILTER_NETLINK_QUEUE=y
        CONFIG_NETFILTER_NETLINK_LOG=y
        CONFIG_NETFILTER_XT_TARGET_NFLOG=y

        # Disable Paranoid Network (required for container internet access)
        CONFIG_ANDROID_PARANOID_NETWORK=n
        EOF

    - name: Apply Kernel Config for 5.10
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      if: inputs.kernel_version == '5.10'
      run: |
        sed -i 's/CONFIG_IP_SET_MAX/65534/g' net/netfilter/ipset/ip_set_core.c
